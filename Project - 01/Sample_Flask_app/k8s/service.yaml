# For Kubernetes Service, you can create a `service.yaml` file that defines how to expose your application to the network. Below is an example of a simple service configuration for a Flask application:

apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
spec:
  selector:
    app: flask-app    # Route to pods with this label
  ports:
  - protocol: TCP
    port: 80          # Service listens on port 80
    targetPort: 5000  # Forwards to container port 5000
  type: NodePort      # Exposes service externally on Minikube node